<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>InsightIQ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="/" />
    <meta name="description" content="Enterprise natural-language analytics over your data and documents." />
    <meta name="theme-color" content="#090b10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600;650;700&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;650;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('insightiq_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
          document.querySelector('meta[name="theme-color"]')?.setAttribute(
            'content',
            t === 'light' ? '#f8fafc' : '#090b10'
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
