# Merges the old `naive` and `advanced` profiles into one profile that
# exercises all 10 advanced RAG principles by default (layout-aware parsing +
# parent-child chunking always apply at ingestion time regardless of profile).
profile: standard
gating: true
transform:
  rewrite: true
  decompose: false
  variations: 2
  hyde: false
routing:
  strategy: hybrid
retrieval:
  embedder: hash-dev
  retriever: hybrid
  top_k: 15
  metadata_filtering: true
fusion: rrf
rerank:
  reranker: lexical-bm25
  top_k: 5
  min_relevance_threshold: 0.5
curation:
  compress: true
  token_budget: 5000
generation:
  llm: openai
  max_context_chunks: 8
  financial_graph: false
reflection:
  critic: true
  max_corrective_rounds: 1
highlight:
  resolve: true
